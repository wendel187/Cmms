<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMMS - Sistema de Gerenciamento de Manutenção</title>

    <!-- CSS Global -->
    <link rel="stylesheet" href="css/style.css">

    <!-- CSS de Páginas Individuais -->
    <link rel="stylesheet" href="pages/home/home.css">
    <link rel="stylesheet" href="pages/tecnicos/tecnicos.css">
    <link rel="stylesheet" href="pages/equipamentos/equipamentos.css">
    <link rel="stylesheet" href="pages/ordens/ordens.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>⚙️ CMMS</h1>
                <p>Computerized Maintenance Management System</p>
            </div>
            <div class="header-status">
                <span id="status-conexao" class="status-badge loading">Verificando...</span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="home">
                <span class="icon">🏠</span> Inicial
            </button>
            <button class="tab-btn" data-tab="tecnicos">
                <span class="icon">👨‍🔧</span> Técnicos
            </button>
            <button class="tab-btn" data-tab="equipamentos">
                <span class="icon">🔧</span> Equipamentos
            </button>
            <button class="tab-btn" data-tab="ordens">
                <span class="icon">📊</span> Ordens de Serviço
            </button>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Conteúdo das páginas será carregado aqui -->
        </main>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
